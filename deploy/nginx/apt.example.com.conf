# Deploy to: /etc/nginx/sites-available/apt.example.com.conf
# ln -sf /etc/nginx/sites-available/apt.example.com.conf /etc/nginx/sites-enabled/
#
# apt-mirror layout (document root):
#   /opt/apt/mirror/<upstream-host>/<path>/dists/...
# Keys (populate-mirror-keys.sh):
#   /opt/apt/keys/
#
# Clients use URIs such as:
#   https://apt.example.com/deb.debian.org/debian/...
#   https://apt.example.com/keys/debian-archive-keyring.gpg

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name apt.example.com;

    access_log /var/log/nginx/apt.example.com.redirect.log;
    return 301 https://$server_name$request_uri;
}

# HTTPS — APT mirror + /keys/
# nginx 1.25.1+: use `http2 on` instead of `listen ... http2`
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apt.example.com;

    ssl_certificate     /etc/nginx/ssl/2025/ssl_bundle.crt;
    ssl_certificate_key   /etc/nginx/ssl/2025/example.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Must match apt-mirror output (not /var/www/html)
    root /opt/apt/mirror;
    disable_symlinks on;            # never follow a symlink out of the tree
    # APT fetches explicit paths (InRelease, Packages, debs); directory indexes are not required.
    autoindex off;
    server_tokens off;              # don't leak the nginx version
    charset utf-8;

    # Never serve dotfiles (stray .htpasswd, .git, editor backups) from the tree.
    location ~ /\.(?!well-known) { deny all; }

    client_max_body_size 0;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # GPG keyrings (must NOT live under /opt/apt/mirror; use separate alias)
    location /keys/ {
        alias /opt/apt/keys/;
        default_type application/octet-stream;
        autoindex off;
    }

    # Point-in-time snapshots (mirror-snapshot.sh) for client date-pinning, e.g.
    #   .../snapshots/20260624-1200/deb.debian.org/debian  in a client's URIs=.
    location /snapshots/ {
        alias /opt/apt/snapshots/;
        autoindex off;           # no directory enumeration; clients use explicit dated paths
    }

    # NOTE: the mirror-manager dashboard (mirror-manager.service, 127.0.0.1:8080) is served
    # by a SEPARATE vhost at apt-manager.example.com (deploy/nginx/mirror-manager.conf),
    # not this one. See docs/MIRROR_MANAGER.md.

    # Human-readable landing page at the root (published by mirror-manager into /opt/apt/www).
    # Only the exact "/" request is overridden; apt clients fetch deep paths, which fall through
    # to the mirror tree below. Falls back to a tiny message if not published yet.
    location = / {
        root /opt/apt/www;
        try_files /index.html @nolanding;
        default_type text/html;
    }
    location @nolanding { return 200 "APT mirror is up. Publish the landing page from mirror-manager.\n"; }

    # Client bootstrap: curl -fsSL https://apt.example.com/setup.sh | sudo sh
    location = /setup.sh {
        root /opt/apt/www;
        default_type text/plain;
        try_files /setup.sh =404;
    }
    location = /setup.sh.sha256 {
        root /opt/apt/www;
        default_type text/plain;
        try_files /setup.sh.sha256 =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/apt.example.com.access.log;
    error_log  /var/log/nginx/apt.example.com.error.log warn;
}
