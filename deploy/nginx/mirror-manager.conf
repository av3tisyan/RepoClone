# Reverse-proxy vhost for the mirror-manager dashboard at:
#     https://apt-manager.example.com
#
# The dashboard has its OWN login now (built-in users in SQLite + signed-cookie
# sessions), so nginx is just a TLS terminator + reverse proxy — no auth_request,
# no ldap_auth, no htpasswd. Manage who can log in from the dashboard's Access tab;
# the first admin is created by setup-mirror-manager.sh (password printed once).
#
# Deploy on the reverse-proxy host:
#   sudo cp deploy/nginx/mirror-manager.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/mirror-manager.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   # DNS: point apt-manager.example.com at this proxy host.
#
# ─ Reaching the daemon ────────────────────────────────────────────────────────
# mirror-manager.service binds 127.0.0.1:8080 on the SYNC host. Pick the upstream:
#
#   A) Proxy runs ON the sync host  → proxy_pass http://127.0.0.1:8080;  (default below)
#
#   B) Proxy is a SEPARATE host (e.g. this one at 10.0.0.7, dashboard on 10.0.0.10):
#      either tunnel  → ssh -fN -L 8080:127.0.0.1:8080 <sync-host>  and keep 127.0.0.1:8080,
#      or set MM_LISTEN_HOST=<sync-ip> on the daemon, firewall :8080 to this proxy only,
#      and use  proxy_pass http://<sync-host-ip>:8080;
#   Because the dashboard now authenticates itself, exposing :8080 to the proxy no longer
#   exposes an unauthenticated API — but still firewall it to the proxy and keep TLS here.
# ──────────────────────────────────────────────────────────────────────────────

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name apt-manager.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apt-manager.example.com;

    ssl_certificate     /etc/nginx/ssl/2025/ssl_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/2025/example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # apt-mirror syncs run long; don't time out the polled log/status.
    proxy_read_timeout 3600s;

    location / {
        # Optional defence-in-depth: limit to admin networks (the app already requires login).
        # allow 10.0.0.0/24;
        # allow 10.0.0.0/24;
        # deny  all;

        proxy_pass http://127.0.0.1:8080;        # see "Reaching the daemon" above for split hosts
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/apt-manager.example.com.access.log;
    error_log  /var/log/nginx/apt-manager.example.com.error.log warn;
}
