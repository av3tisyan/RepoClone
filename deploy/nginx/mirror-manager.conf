# Reverse-proxy vhost for the mirror-manager dashboard at:
#     https://apt-manager.example.com
#
# Deploy on the reverse-proxy host:
#   sudo cp deploy/nginx/mirror-manager.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/mirror-manager.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   # DNS: point apt-manager.example.com at this proxy host.
#
# Auth (required — the manager edits mirror.list and starts syncs; treat as root-equiv).
# This vhost authenticates HTTP Basic credentials against LDAPS via nginx auth_request +
# the ldap_auth.py backend (deploy/systemd/mirror-manager-ldap-auth.service):
#   sudo apt-get install -y python3-ldap
#   sudo install -m0644 scripts/mirror-manager/ldap_auth.py /opt/apt/mirror-manager/ldap_auth.py
#   sudo cp deploy/systemd/mirror-manager-ldap-auth.service /etc/systemd/system/
#   # edit LDAP_URI / LDAP_USER_DN_TEMPLATE (and optionally LDAP_REQUIRED_GROUP) in the unit
#   sudo systemctl daemon-reload && sudo systemctl enable --now mirror-manager-ldap-auth
# (For a static htpasswd instead, drop the auth_request lines and use
#  `auth_basic "..."; auth_basic_user_file /etc/nginx/mirror-manager.htpasswd;`.)
#
# ─ Reaching the daemon ────────────────────────────────────────────────────────
# mirror-manager.service binds 127.0.0.1:8080 on the SYNC host. Pick the upstream:
#
#   A) Proxy runs ON the sync host  → proxy_pass http://127.0.0.1:8080;  (default below)
#
#   B) Proxy is a SEPARATE host → do NOT expose :8080 raw on the LAN (it bypasses this
#      auth and the daemon runs as root). Prefer an SSH tunnel from the proxy host:
#          ssh -fN -L 8080:127.0.0.1:8080 <sync-host>      # then keep proxy_pass 127.0.0.1:8080
#      (e.g. an autossh/systemd unit). If you must reach it over the network instead,
#      set MM_LISTEN_HOST=<lan-ip> on the daemon, set MM_TOKEN, AND firewall :8080 to the
#      proxy IP only — then use  proxy_pass http://<sync-host-ip>:8080;
# ──────────────────────────────────────────────────────────────────────────────

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name apt-manager.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apt-manager.example.com;

    # Wildcard *.example.com bundle (same as the apt vhost); adjust if you use a
    # dedicated cert for this name.
    ssl_certificate     /etc/nginx/ssl/2025/ssl_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/2025/example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # apt-mirror syncs run long; don't time out the polled log/status.
    proxy_read_timeout 3600s;

    # Browser shows a Basic-auth prompt; the LDAPS backend validates the credentials.
    location = /_ldap_auth {
        internal;
        proxy_pass http://127.0.0.1:8889;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }
    # Re-issue the Basic challenge when the backend says 401.
    location @ldap_challenge {
        add_header WWW-Authenticate 'Basic realm="apt-mirror manager"' always;
        return 401;
    }

    location / {
        auth_request /_ldap_auth;
        # Capture the authenticated username from the auth backend and pass it upstream,
        # so the manager's audit log records WHO performed each change.
        auth_request_set $mm_user $upstream_http_x_auth_user;
        error_page 401 = @ldap_challenge;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-User $mm_user;
    }

    access_log /var/log/nginx/apt-manager.example.com.access.log;
    error_log  /var/log/nginx/apt-manager.example.com.error.log warn;
}
